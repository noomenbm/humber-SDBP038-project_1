<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Noomen Belmechri | UI Component Assignment</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <header class="site-header">
        <nav class="site-nav" aria-label="Primary">
            <a class="site-logo" href="index.html">
                <img class="site-logo-image" src="./images/logo.png" alt="Noomen Belmechri logo" />
            </a>

            <ul class="nav-list">
                <li><a class="nav-link" href="index.html">Home</a></li>
                <li><a class="nav-link" href="about.html">About</a></li>
                <li><a class="nav-link" href="projects.html">Projects</a></li>
                <li><a class="nav-link nav-link-current" href="contact.html" aria-current="page">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main class="page-content">
        <section class="hero-section" aria-labelledby="contact-title">
            <p class="eyebrow">Contact form</p>
            <h1 id="contact-title">Contact me</h1>
            <p>This is a contact form with the proper  elements and focus/hover states.</p>
        </section>

        <section class="contact-section" aria-labelledby="contact-form-title">
            <form class="contact-form" action="#" method="post">
                <h2 id="contact-form-title">Send a Message</h2>

                <div class="form-field">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" required />
                </div>

                <div class="form-field">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required />
                </div>

                <div class="form-field">
                    <label for="subject">Subject</label>
                    <select id="subject" name="subject" required>
                        <option value="">Choose a subject</option>
                        <option value="inquiry">Inquiry</option>
                        <option value="feedback">Feedback</option>
                        <option value="support">Support</option>
                    </select>
                </div>

                <div class="form-field">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="6" required></textarea>
                </div>

                <button class="form-button" type="submit">Send Message</button>
            </form>
        </section>
    </main>
</body>
</html>
